name: PR Summarizer
description: Fetches a PR diff and posts an AI-generated summary as a comment using Gemini

inputs:
  github-token:
    description: GitHub token for API access and posting comments
    required: true
  gemini-api-key:
    description: Google Gemini API key for generative AI access
    required: true

runs:
  using: node20
  main: index.js
